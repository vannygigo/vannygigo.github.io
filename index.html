<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartland Flame</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png">
</head>

<body>
    <header>
        <div class="nav">

            <div class="logo">
                <img src="images/logo.png" alt="Heartland Flame Logo">
            </div>

            <!-- Hamburger button -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav id="nav-links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Products</a>
                <a href="#">Sustainability</a>
                <a href="#">Agriculture Solutions</a>
            </nav>

            <input type="text" placeholder="Search">

        </div>
    </header>

    <!-- Banner Section -->
    <section class="image-section">
        <img src="images/banner.jpg" alt="Banner">
    </section>


    <!-- Products Section -->
    <section class="image-section">
        <img src="images/products-v1.png" alt="Products">
    </section>


    <footer>
        <div class="footer">

            <div class="footer-logo">
                <img src="images/logo.png" alt="Heartland Flame Logo">
            </div>

            <div>
                <h3>Products</h3>
                <p>Charcoal Briquettes</p>
                <p>Biochar</p>
            </div>

            <div>
                <h3>Information</h3>
                <p>About Us</p>
                <p>Sustainability</p>
                <p>Distribution Inquiry</p>
            </div>

            <div>
                <h3>Contact</h3>
                <p>info@heartlandflame.com</p>
                <p>+1 515 777 5786</p>

                <div class="social-icons">

                    <a href="https://t.me/YOUR_TELEGRAM_LINK" target="_blank">
                        <img src="images/telegram.png" alt="Telegram">
                    </a>

                    <a href="https://facebook.com/YOUR_FACEBOOK_LINK" target="_blank">
                        <img src="images/facebook.png" alt="Facebook">
                    </a>

                </div>

            </div>

        </div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active'); // show/hide menu
            hamburger.classList.toggle('active'); // animate hamburger to X
        });
    </script>

</body>

</html>
